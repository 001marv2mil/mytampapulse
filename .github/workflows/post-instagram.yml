name: Post to Instagram

on:
  schedule:
    - cron: '0 18 * * *'   # 2:00 PM EDT (Eastern Daylight)
    - cron: '0 20 * * *'   # 4:00 PM EDT
    - cron: '0 23 * * *'   # 7:00 PM EDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-urw-base35 ttf-mscorefonts-installer fontconfig || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/oswald/Oswald-Bold.ttf" -O /usr/local/share/fonts/Oswald-Bold.ttf || true
          fc-cache -f -v || true

      - name: Install dependencies
        run: |
          pip install pillow requests python-dotenv beautifulsoup4 lxml

      - name: Run post script
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: |
          cd automation
          python go.py

      - name: Commit post log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/posted_log.json automation/used_photos.json
          git diff --staged --quiet || git commit -m "update post log [skip ci]"
          git push
