name: Repost Tampa Reels

on:
  schedule:
    # 2 reels/day: 10 AM + 7 PM ET
    - cron: '0 14 * * *'   # 10 AM ET
    - cron: '0 23 * * *'   # 7 PM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Scrape fresh reels
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          cd automation
          python repost_reel.py --scrape

      - name: Post reel
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          cd automation
          python repost_reel.py

      - name: Commit logs and cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/tampa_repost_log.json automation/tampa_reel_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update tampa repost log [skip ci]"
          git push
