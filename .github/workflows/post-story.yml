name: Post Tampa Story

on:
  schedule:
    - cron: '0 16 * * *'   # 12 PM EDT (summer)
    - cron: '0 17 * * *'   # 12 PM EST (winter)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  story:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-urw-base35 ttf-mscorefonts-installer fontconfig || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/oswald/Oswald-Bold.ttf" -O /usr/local/share/fonts/Oswald-Bold.ttf || true
          fc-cache -f -v || true

      - name: Install dependencies
        run: pip install pillow requests python-dotenv beautifulsoup4 lxml

      - name: Post story
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cd automation
          python post_story.py

      - name: Commit story log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/story_posted_log.json
          git diff --staged --quiet || git commit -m "update story log [skip ci]"
          git push
