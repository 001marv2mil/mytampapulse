name: Post @petoshealthyb Fun Fact Story

on:
  schedule:
    # 1x daily: 2PM ET (Eastern Time)
    - cron: '0 18 * * *'    # 2:00 PM ET
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Oswald font
        run: |
          sudo mkdir -p /usr/local/share/fonts
          sudo curl -L -o /usr/local/share/fonts/Oswald-Bold.ttf \
            "https://github.com/googlefonts/OswaldFont/raw/main/fonts/ttf/Oswald-Bold.ttf"
          sudo fc-cache -f -v

      - name: Install dependencies
        run: pip install pillow requests python-dotenv

      - name: Run petosb_story.py
        env:
          PETOSB_PAGE_ACCESS_TOKEN: ${{ secrets.PETOSB_PAGE_ACCESS_TOKEN }}
          PETOSB_IG_ACCOUNT_ID: ${{ secrets.PETOSB_IG_ACCOUNT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        working-directory: automation
        run: python petosb_story.py

      - name: Update story log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/petosb_story_log.json || true
          git diff --cached --quiet || git commit -m "petosb: update story log [skip ci]"
          git push || true
