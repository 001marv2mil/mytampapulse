name: Post @petoshealthyb Curated Content

on:
  schedule:
    # 2x daily: 12PM and 5PM EDT (UTC-4)
    - cron: '0 16 * * *'    # 12:00 PM EDT
    - cron: '0 21 * * *'    # 5:00 PM EDT
  workflow_dispatch:          # manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run petosb_post.py
        env:
          PETOSB_PAGE_ACCESS_TOKEN: ${{ secrets.PETOSB_PAGE_ACCESS_TOKEN }}
          PETOSB_IG_ACCOUNT_ID: ${{ secrets.PETOSB_IG_ACCOUNT_ID }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        working-directory: automation
        run: python petosb_post.py

      - name: Update post log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/petosb_posted_log.json || true
          git diff --cached --quiet || git commit -m "petosb: update posted log [skip ci]"
          git push || true
